<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>充值中心</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
    background:#0B0C0E;
    color:#fff;
    font-family:system-ui;
    padding-bottom:30px;
}
:root{
    --green:#8AFF2B;
    --card:#171A1D;
}
.top-nav{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:14px 16px;
    background:#111315;
}
.nav-back{font-size:18px;}
.nav-title{font-size:16px;font-weight:600;}
.pay-type{
    margin:16px;
    background:var(--card);
    border-radius:10px;
    padding:15px;
}
.type-title{
    font-size:14px;
    margin-bottom:12px;
    color:#ccc;
}
.type-box{
    display:flex;
    gap:10px;
}
.type-item{
    flex:1;
    text-align:center;
    padding:10px 0;
    border-radius:8px;
    background:#22262a;
    font-size:13px;
}
.type-item.active{
    background:var(--green);
    color:#000;
}
.money-wrap{
    margin:16px;
}
.money-title{
    font-size:14px;
    color:#ccc;
    margin-bottom:12px;
}
.money-grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:10px;
}
.money-item{
    background:var(--card);
    text-align:center;
    line-height:44px;
    border-radius:8px;
    font-size:14px;
}
.money-item.active{
    border:1px solid var(--green);
}
.input-own{
    width:100%;
    margin-top:12px;
    height:44px;
    background:var(--card);
    border:none;
    border-radius:8px;
    padding:0 12px;
    color:#fff;
    outline:none;
}
.submit-btn{
    width:calc(100% - 32px);
    margin:20px 16px;
    height:46px;
    background:var(--green);
    color:#000;
    border:none;
    border-radius:22px;
    font-size:15px;
    font-weight:600;
}
</style>
</head>
<body>
<div class="top-nav">
    <span class="nav-back" onclick="history.go(-1)">&lt;</span>
    <span class="nav-title">USDT充值</span>
    <span></span>
</div>
<div class="pay-type">
    <div class="type-title">选择充值币种</div>
    <div class="type-box">
        <div class="type-item active">TRC20</div>
        <div class="type-item">ERC20</div>
        <div class="type-item">BSC</div>
    </div>
</div>
<div class="money-wrap">
    <div class="money-title">选择充值金额(USDT)</div>
    <div class="money-grid">
        <div class="money-item">10</div>
        <div class="money-item">30</div>
        <div class="money-item">50</div>
        <div class="money-item">100</div>
        <div class="money-item">200</div>
        <div class="money-item">500</div>
    </div>
    <input class="input-own" placeholder="自定义充值金额">
</div>
<button class="submit-btn" onclick="paySubmit()">立即充值</button>
<script>
let moneyItem=document.querySelectorAll('.money-item');
moneyItem.forEach(item=>{
    item.onclick=function(){
        moneyItem.forEach(i=>i.classList.remove('active'))
        this.classList.add('active')
    }
})
let typeItem=document.querySelectorAll('.type-item');
typeItem.forEach(item=>{
    item.onclick=function(){
        typeItem.forEach(i=>i.classList.remove('active'))
        this.classList.add('active')
    }
})
function paySubmit(){
    alert("充值请求已提交，跳转收款地址")
}
</script>
</body>
</html>
