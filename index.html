<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>首页</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}
body {
  background: #0B0C0E;
  color: #fff;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  padding-bottom: 130px;
}
:root {
  --green:#8AFF2B;
  --card:#171A1D;
  --dark:#0B0C0E;
}
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 14px 16px;
  background:#111315;
}
.logo {
  width: 38px;
  height: 38px;
  border-radius: 6px;
  background: var(--green);
}
.header-right {
  display: flex;
  gap: 18px;
  align-items: center;
}
.icon {
  font-size: 20px;
}
.btn-recharge {
  background: var(--green);
  color: #000;
  font-size: 13px;
  padding: 6px 14px;
  border-radius: 20px;
  font-weight: 500;
}
.user-bar {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 16px;
}
.avatar {
  width: 52px;
  height: 52px;
  border-radius: 50%;
  border: 2px solid var(--green);
}
.user-info {
  flex: 1;
}
.name {
  font-size: 16px;
  font-weight: 600;
}
.vip {
  font-size: 12px;
  color: #999;
  margin-top: 4px;
}
.user-actions {
  display: flex;
  gap: 8px;
}
.btn-invite {
  background:#22262a;
  color: #fff;
  font-size: 12px;
  padding: 5px 10px;
  border-radius: 14px;
}
.btn-money {
  background:#22262a;
  color: #fff;
  font-size: 12px;
  padding: 5px 10px;
  border-radius: 14px;
}
.banner {
  height: 110px;
  margin: 0 16px;
  border-radius: 10px;
  background: var(--card);
}
.quick {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 6px;
  padding: 16px;
}
.quick-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
}
.quick-icon {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  background: var(--card);
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--green);
  font-size: 18px;
}
.quick-text {
  font-size: 11px;
  color: #ddd;
}
.sec-title {
  display: flex;
  justify-content: space-between;
  padding: 0 16px;
  margin: 16px 0 10px;
}
.sec-left {
  font-size: 15px;
  font-weight: 600;
}
.sec-more {
  font-size: 12px;
  color: #999;
}
.game-scroll {
  display: flex;
  gap: 10px;
  padding: 0 16px;
  overflow-x: auto;
}
.game-item {
  min-width: 100px;
  height: 130px;
  background: var(--card);
  border-radius: 8px;
  position: relative;
}
.game-tag {
  position: absolute;
  top: 6px;
  left: 6px;
  background: var(--green);
  color: #000;
  font-size: 10px;
  padding: 2px 6px;
  border-radius: 4px;
}
.game-name {
  position: absolute;
  bottom: 8px;
  width: 100%;
  text-align: center;
  font-size: 11px;
  color:#eee;
}
.tag-scroll {
  display: flex;
  gap: 8px;
  padding: 0 16px;
  overflow-x: auto;
  margin-bottom: 10px;
}
.tag {
  white-space: nowrap;
  padding: 6px 12px;
  background: var(--card);
  border-radius: 14px;
  font-size: 12px;
}
.tag.active {
  background: var(--green);
  color: #000;
}
.grid-3 {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  padding: 0 16px;
}
.grid-item {
  height: 120px;
  background: var(--card);
  border-radius: 8px;
  position: relative;
}
.footer {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
  height: 100px;
  background:#111315;
  display: flex;
  justify-content: space-around;
  align-items: center;
}
.foot-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  font-size: 12px;
  color: #888;
  gap: 4px;
}
.foot-item.active {
  color: var(--green);
}
.foot-icon {
  font-size: 20px;
}
</style>
</head>
<body>
